name: Sync Past LeetCode Submissions

on:
  workflow_dispatch: # Allows you to trigger this manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Run LeetCode Sync
        uses: joshcai/leetcode-sync@v1.5
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: 'past-submissions' # Puts files in main directory like LeetHub
